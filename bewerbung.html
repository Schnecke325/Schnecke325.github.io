<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bewerbung · Create: Unlimited Rails</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f0a500;
      --dark: #0a0a0b;
      --dark2: #111113;
      --dark3: #1a1a1e;
      --dark4: #222226;
      --text: #e8e6e0;
      --muted: #888680;
      --border: rgba(240,165,0,0.12);
      --border-hover: rgba(240,165,0,0.3);
      --green: #4ade80;
      --red: #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 48px,
        rgba(240,165,0,0.018) 48px, rgba(240,165,0,0.018) 50px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,11,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
    }
    nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-logo span { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--gold); }
    .lang-btn {
      background: transparent;
      border: 1px solid rgba(240,165,0,0.35);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn:hover { background: var(--gold); color: #000; }

    /* LAYOUT */
    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* PAGE HEADER */
    .page-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.8rem;
    }
    .page-sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    /* CARD */
    .card {
      background: var(--dark2);
      border: 1px solid var(--border);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .card + .card { margin-top: 1.5rem; }

    /* STEP INDICATOR */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 3rem;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }
    .step-num {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .step.active .step-num {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(240,165,0,0.08);
    }
    .step.done .step-num {
      border-color: var(--green);
      color: var(--green);
      background: rgba(74,222,128,0.08);
    }
    .step-label {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.3s;
    }
    .step.active .step-label { color: var(--text); }
    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 12px;
    }

    /* FORM ELEMENTS */
    .field { margin-bottom: 1.5rem; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field input[type="text"],
    .field textarea {
      width: 100%;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
      border-radius: 0;
      -webkit-appearance: none;
    }
    .field input[type="text"]:focus,
    .field textarea:focus {
      border-color: rgba(240,165,0,0.45);
    }
    .field input[type="text"]::placeholder,
    .field textarea::placeholder { color: #555; }
    .field textarea { resize: vertical; min-height: 120px; line-height: 1.7; }

    /* FILE UPLOAD */
    .upload-zone {
      border: 1px dashed rgba(240,165,0,0.25);
      background: var(--dark3);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: rgba(240,165,0,0.5); background: rgba(240,165,0,0.04); }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--gold);
    }
    .upload-text { font-size: 0.85rem; color: var(--muted); }
    .upload-text strong { color: var(--text); font-weight: 400; }

    /* IMAGE PREVIEWS */
    .previews {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      aspect-ratio: 4/3;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .preview-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: var(--red);
      width: 20px;
      height: 20px;
      cursor: pointer;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* BUTTONS */
    .btn-primary {
      background: var(--gold);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 13px 32px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-block;
      text-decoration: none;
    }
    .btn-primary:hover { background: #ffc42a; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 24px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-danger {
      background: transparent;
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }
    .btn-accept {
      background: transparent;
      border: 1px solid rgba(74,222,128,0.3);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-accept:hover { background: rgba(74,222,128,0.1); }

    .btn-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

    /* NOTICE */
    .notice {
      background: rgba(240,165,0,0.06);
      border: 1px solid rgba(240,165,0,0.15);
      border-left: 3px solid var(--gold);
      padding: 12px 16px;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* SUCCESS */
    .success-icon {
      width: 56px;
      height: 56px;
      border: 2px solid var(--green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      color: var(--green);
      font-size: 1.4rem;
    }

    /* ADMIN TABLE */
    .admin-app {
      background: var(--dark3);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .admin-app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .admin-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .admin-discord { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .admin-reason {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.7;
      padding: 1rem;
      background: var(--dark2);
      border-left: 2px solid var(--border);
      margin-bottom: 1rem;
      font-style: italic;
    }
    .admin-img-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }
    .admin-img-grid img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
    }
    .admin-img-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .admin-date { font-size: 0.72rem; color: #555; margin-bottom: 1rem; }

    /* STATUS BADGES */
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid;
    }
    .badge-offen { border-color: rgba(240,165,0,0.3); color: var(--gold); }
    .badge-angenommen { border-color: rgba(74,222,128,0.3); color: var(--green); }
    .badge-abgelehnt { border-color: rgba(248,113,113,0.3); color: var(--red); }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* LOADING SPINNER */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      padding: 12px 24px;
      z-index: 999;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 2rem 0;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      main { padding: 2rem 1rem 4rem; }
      .card { padding: 1.5rem; }
      .steps { gap: 0; }
      .step-label { display: none; }
    }
  </style>
</head>

<script>
/* ═══════════════════════════════════════════════════
   API LAYER
   ─────────────────────────────────────────────────
   All data operations go through this object.
   To switch to a real backend later, only change
   this object – the UI code stays untouched.

   Expected REST contract (when backend is ready):
     GET    /api/applications           → [ ...apps ]
     POST   /api/applications           → { id, ...app }
     PATCH  /api/applications/:id       → { ...app }  (body: { status })
     DELETE /api/applications/:id       → { ok: true }

   Toggle USE_BACKEND = true and set API_BASE when ready.
═══════════════════════════════════════════════════ */
const USE_BACKEND = false;          // ← flip to true when backend is ready
const API_BASE    = '/api';         // ← your backend base URL

const LS_KEY = 'cur_apps_v2';

const API = {
  async getAll() {
    if (USE_BACKEND) {
      const r = await fetch(`${API_BASE}/applications`);
      return r.json();
    }
    return JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  },

  async create(data) {
    if (USE_BACKEND) {
      const r = await fetch(`${API_BASE}/applications`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      return r.json();
    }
    const apps = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    const newApp = { ...data, id: Date.now(), status: 'offen', createdAt: new Date().toISOString() };
    apps.unshift(newApp);
    localStorage.setItem(LS_KEY, JSON.stringify(apps));
    return newApp;
  },

  async updateStatus(id, status) {
    if (USE_BACKEND) {
      const r = await fetch(`${API_BASE}/applications/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      return r.json();
    }
    const apps = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    const idx = apps.findIndex(a => a.id === id);
    if (idx !== -1) { apps[idx].status = status; localStorage.setItem(LS_KEY, JSON.stringify(apps)); }
    return apps[idx];
  },
};

/* ═══════════════════════════════════════════════════

    submit_btn: 'Submit application',

    back_home: '← Back to home',

    builds_section: 'Builds',

/* ═══════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════ */
const ADMIN_SECRET = '60632917';
let lang  = 'de';
let page  = 'start';   // start | step2 | step3 | thanks | admin
let user  = {};        // { discord, minecraft }
let formData = {};     // { reason, builds[], vehicles[] }

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function t(key) { return T[lang][key] || key; }

function esc(s) {
  return String(s || '').replace(/[&<>"']/g,
    c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
}

function showToast(msg, dur = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function filesToDataURLs(fileList) {
  return Promise.all(Array.from(fileList || []).map(f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => res(null);
    r.readAsDataURL(f);
  }))).then(arr => arr.filter(Boolean));
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString(lang === 'de' ? 'de-DE' : 'en-GB', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
const app = document.getElementById('app');

function render() {
  if (page === 'start')  return renderStart();
  if (page === 'step2')  return renderStep2();
  if (page === 'step3')  return renderStep3();
  if (page === 'thanks') return renderThanks();
  if (page === 'admin')  return renderAdmin();
}

function stepIndicator(active) {
  const steps = [
    { num: 1, label: t('step1') },
    { num: 2, label: t('step2') },
    { num: 3, label: t('step3') },
  ];
  return `<div class="steps">
    ${steps.map((s, i) => {
      const cls = s.num < active ? 'done' : s.num === active ? 'active' : '';
      const numContent = s.num < active ? '✓' : s.num;
      const line = i < steps.length - 1 ? '<div class="step-line"></div>' : '';
      return `<div class="step ${cls}">
        <div class="step-num">${numContent}</div>
        <span class="step-label">${s.label}</span>
      </div>${line}`;
    }).join('')}
  </div>`;
}

function pageHeader() {
  return `
    <p class="page-eyebrow">${t('eyebrow')}</p>
    <h1 class="page-title">${t('page_title')}</h1>
    <p class="page-sub">${t('page_sub')}</p>
  `;
}

/* ── STEP 1: Discord + MC name ── */
function renderStart() {
  app.innerHTML = `
    ${pageHeader()}
    ${stepIndicator(1)}
    <div class="card">
      <div class="field">
        <label>${t('discord_label')}</label>
        <input type="text" id="discordInput" placeholder="${t('discord_ph')}" autocomplete="off" value="${esc(user.discord||'')}" />
      </div>
      <div class="field">
        <label>${t('mc_label')}</label>
        <input type="text" id="mcInput" placeholder="${t('mc_ph')}" autocomplete="off" value="${esc(user.minecraft||'')}" />
      </div>
      <div class="btn-row" style="margin-top:2rem">
        <button class="btn-primary" id="nextBtn">${t('next_btn')}</button>
      </div>
    </div>
  `;

  document.getElementById('nextBtn').addEventListener('click', () => {
    const discord   = document.getElementById('discordInput').value.trim();
    const minecraft = document.getElementById('mcInput').value.trim();

    if (discord === ADMIN_SECRET || minecraft === ADMIN_SECRET) {
      page = 'admin'; render(); return;
    }
    if (!discord || !minecraft) {
      showToast(lang === 'de' ? 'Bitte beide Felder ausfüllen.' : 'Please fill in both fields.');
      return;
    }
    user = { discord, minecraft };
    page = 'step2'; render();
  });

  document.querySelectorAll('[data-de]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
}

/* ── STEP 2: Reason ── */
function renderStep2() {
  app.innerHTML = `
    ${pageHeader()}
    ${stepIndicator(2)}
    <div class="card">
      <div class="field">
        <label>${t('reason_label')}</label>
        <textarea id="reasonInput" placeholder="${t('reason_ph')}" rows="6">${esc(formData.reason||'')}</textarea>
      </div>
      <div class="btn-row" style="margin-top:2rem">
        <button class="btn-ghost" id="backBtn">${t('back')}</button>
        <button class="btn-primary" id="nextBtn">${t('next_btn')}</button>
      </div>
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click', () => { page = 'start'; render(); });
  document.getElementById('nextBtn').addEventListener('click', () => {
    const reason = document.getElementById('reasonInput').value.trim();
    if (!reason) { showToast(lang === 'de' ? 'Bitte deine Motivation eingeben.' : 'Please describe your motivation.'); return; }
    formData.reason = reason;
    page = 'step3'; render();
  });
}

/* ── STEP 3: Images + Submit ── */
function renderStep3() {
  app.innerHTML = `
    ${pageHeader()}
    ${stepIndicator(3)}
    <div class="card">
      <div class="notice">${t('notice')}</div>

      <div class="field">
        <label>${t('builds_label')}</label>
        <div class="upload-zone" id="buildsZone">
          <input type="file" id="buildsInput" accept="image/*" multiple />
          <div class="upload-icon">⬆</div>
          <p class="upload-text"><strong>${t('upload_hint')}</strong></p>
        </div>
        <div class="previews" id="buildsPreviews"></div>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>${t('vehicles_label')}</label>
        <div class="upload-zone" id="vehiclesZone">
          <input type="file" id="vehiclesInput" accept="image/*" multiple />
          <div class="upload-icon">⬆</div>
          <p class="upload-text"><strong>${t('upload_hint')}</strong></p>
        </div>
        <div class="previews" id="vehiclesPreviews"></div>
      </div>

      <div class="btn-row" style="margin-top:2rem">
        <button class="btn-ghost" id="backBtn">${t('back')}</button>
        <button class="btn-primary" id="submitBtn">${t('submit_btn')}</button>
      </div>
    </div>
  `;

  // file store (actual File objects)
  let buildsFiles   = formData._buildsFiles   || [];
  let vehiclesFiles = formData._vehiclesFiles || [];

  function renderPreviews(files, container) {
    container.innerHTML = '';
    files.forEach((f, i) => {
      const url = URL.createObjectURL(f);
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.innerHTML = `<img src="${url}" alt="" /><button class="preview-remove" data-i="${i}">✕</button>`;
      container.appendChild(item);
    });
  }

  function setupUpload(inputId, zoneId, previewId, filesArr, setFiles) {
    const input    = document.getElementById(inputId);
    const zone     = document.getElementById(zoneId);
    const previews = document.getElementById(previewId);

    input.addEventListener('change', () => {
      const merged = [...filesArr, ...Array.from(input.files)];
      setFiles(merged);
      renderPreviews(merged, previews);
      input.value = '';
    });

    previews.addEventListener('click', e => {
      const btn = e.target.closest('[data-i]');
      if (!btn) return;
      filesArr.splice(Number(btn.dataset.i), 1);
      setFiles(filesArr);
      renderPreviews(filesArr, previews);
    });

    ['dragover','dragleave','drop'].forEach(ev => zone.addEventListener(ev, e => {
      e.preventDefault();
      if (ev === 'dragover') zone.classList.add('drag');
      if (ev === 'dragleave') zone.classList.remove('drag');
      if (ev === 'drop') {
        zone.classList.remove('drag');
        const merged = [...filesArr, ...Array.from(e.dataTransfer.files)];
        setFiles(merged);
        renderPreviews(merged, previews);
      }
    }));
  }

  setupUpload('buildsInput',   'buildsZone',   'buildsPreviews',   buildsFiles,   f => { buildsFiles = f; });
  setupUpload('vehiclesInput', 'vehiclesZone', 'vehiclesPreviews', vehiclesFiles, f => { vehiclesFiles = f; });

  // restore existing previews
  if (buildsFiles.length)   renderPreviews(buildsFiles,   document.getElementById('buildsPreviews'));
  if (vehiclesFiles.length) renderPreviews(vehiclesFiles, document.getElementById('vehiclesPreviews'));

  document.getElementById('backBtn').addEventListener('click', () => {
    formData._buildsFiles   = buildsFiles;
    formData._vehiclesFiles = vehiclesFiles;
    page = 'step2'; render();
  });

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>${t('submitting')}`;

    const [buildsData, vehiclesData] = await Promise.all([
      filesToDataURLs(buildsFiles),
      filesToDataURLs(vehiclesFiles),
    ]);

    await API.create({
      name:     user.minecraft,
      discord:  user.discord,
      reason:   formData.reason,
      builds:   buildsData,
      vehicles: vehiclesData,
    });

    page = 'thanks'; render();
  });
}

/* ── THANKS ── */
function renderThanks() {
  app.innerHTML = `
    <div class="card" style="text-align:center;padding:4rem 2rem;">
      <div class="success-icon" style="margin:0 auto 1.5rem;">✓</div>
      <p class="page-eyebrow" style="text-align:center;margin-bottom:0.8rem;">${t('eyebrow')}</p>
      <h2 style="font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:0.04em;margin-bottom:1rem;">${t('thanks_title')}</h2>
      <p style="color:var(--muted);font-size:0.95rem;line-height:1.7;max-width:420px;margin:0 auto 2.5rem;">${t('thanks_sub')}</p>
      <div class="btn-row" style="justify-content:center;gap:1rem;">
        <a href="index.html" class="btn-ghost">${t('back_home')}</a>
        <button class="btn-primary" id="newAppBtn">${t('new_app')}</button>
      </div>
    </div>
  `;
  document.getElementById('newAppBtn').addEventListener('click', () => {
    user = {}; formData = {}; page = 'start'; render();
  });
}

/* ── ADMIN ── */
async function renderAdmin() {
  const al = lang; // admin uses current lang keys
  app.innerHTML = `
    <p class="page-eyebrow">${t('admin_eyebrow')}</p>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
      <h1 class="page-title" style="margin:0;">${t('admin_title')}</h1>
      <button class="btn-ghost" id="adminBack">${t('back')}</button>
    </div>
    <div id="adminList"><p style="color:var(--muted);">Lade…</p></div>
  `;
  document.getElementById('adminBack').addEventListener('click', () => { page = 'start'; render(); });

  const apps = await API.getAll();
  const list = document.getElementById('adminList');

  if (!apps.length) {
    list.innerHTML = `<p style="color:var(--muted);">${t('no_apps')}</p>`;
    return;
  }

  list.innerHTML = '';
  apps.forEach(a => {
    const el = document.createElement('div');
    el.className = 'admin-app';
    el.dataset.id = a.id;

    const badgeClass = a.status === 'angenommen' ? 'badge-angenommen' : a.status === 'abgelehnt' ? 'badge-abgelehnt' : 'badge-offen';
    const badgeLabel = a.status;

    el.innerHTML = `
      <div class="admin-app-header">
        <div>
          <div class="admin-name">${esc(a.name)}</div>
          <div class="admin-discord">Discord: ${esc(a.discord)}</div>
          <div class="admin-date">${formatDate(a.createdAt)}</div>
        </div>
        <span class="badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="admin-reason">${esc(a.reason)}</div>
      ${a.builds?.length ? `<div class="admin-img-label">${t('builds_section')}</div><div class="admin-img-grid">${a.builds.map(s => `<img src="${s}" alt="" />`).join('')}</div>` : ''}
      ${a.vehicles?.length ? `<div class="admin-img-label" style="margin-top:10px">${t('vehicles_section')}</div><div class="admin-img-grid">${a.vehicles.map(s => `<img src="${s}" alt="" />`).join('')}</div>` : ''}
      <div class="btn-row" style="margin-top:1.2rem;justify-content:flex-end;">
        <button class="btn-danger" data-action="reject" data-id="${a.id}">${t('reject')}</button>
        <button class="btn-accept" data-action="accept" data-id="${a.id}">${t('accept')}</button>
      </div>
    `;
    list.appendChild(el);
  });

  list.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.getAttribute('data-action');
    const id     = Number(btn.getAttribute('data-id'));
    const status = action === 'accept' ? 'angenommen' : 'abgelehnt';
    await API.updateStatus(id, status);
    showToast(action === 'accept' ? t('toast_accept') : t('toast_reject'));
    renderAdmin();
  });
}

/* ═══════════════════════════════════════════════════
   LANGUAGE TOGGLE

document.getElementById('langBtn').addEventListener('click', () => {
  lang = lang === 'de' ? 'en' : 'de';
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  document.documentElement.lang = lang;
  render();
});

/* ── BOOT ── */
render();
</script>
