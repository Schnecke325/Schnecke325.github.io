<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In Arbeit · Create: Unlimited Rails</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f0a500;
      --dark: #0a0a0b;
      --dark2: #111113;
      --dark3: #1a1a1e;
      --text: #e8e6e0;
      --muted: #888680;
      --border: rgba(240,165,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Rail grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(240,165,0,0.018) 48px, rgba(240,165,0,0.018) 50px),
        repeating-linear-gradient(0deg,  transparent, transparent 48px, rgba(240,165,0,0.012) 48px, rgba(240,165,0,0.012) 50px);
      pointer-events: none;
      z-index: 0;
    }

    /* Soft radial glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(240,165,0,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }

    /* Animated track */
    .track-wrap {
      margin: 0 auto 2.5rem;
      width: 120px;
      position: relative;
    }
    .track {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .rail {
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .rail::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
      animation: railShine 2s ease-in-out infinite;
    }
    .rail:nth-child(2)::after { animation-delay: 0.3s; }
    @keyframes railShine {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .sleepers {
      position: absolute;
      inset: -4px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    .sleeper {
      width: 3px;
      height: 28px;
      background: rgba(240,165,0,0.25);
      border-radius: 2px;
    }

    /* WIP icon */
    .wip-icon {
      width: 72px;
      height: 72px;
      border: 1px solid rgba(240,165,0,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 1.8rem;
      background: rgba(240,165,0,0.05);
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(240,165,0,0.15); }
      50%      { box-shadow: 0 0 0 12px rgba(240,165,0,0); }
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }
    .sub strong {
      color: var(--text);
      font-weight: 400;
    }

    /* Page name badge */
    .page-badge {
      display: inline-block;
      background: rgba(240,165,0,0.08);
      border: 1px solid rgba(240,165,0,0.2);
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 16px;
      margin-bottom: 2rem;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      background: var(--gold);
      color: #000;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 28px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-block;
    }
    .btn-primary:hover { background: #ffc42a; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 24px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-block;
    }
    .btn-ghost:hover { border-color: rgba(240,165,0,0.35); color: var(--text); }

    /* Footer */
    .footer-note {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.08em;
      white-space: nowrap;
      z-index: 1;
    }

    /* Language toggle */
    .lang-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      background: transparent;
      border: 1px solid rgba(240,165,0,0.35);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
    }
    .lang-btn:hover { background: var(--gold); color: #000; }

    /* Back link top-left */
    .back-link {
      position: fixed;
      top: 1.35rem;
      left: 1.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
      z-index: 10;
    }
    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>

<a href="curhome.html" class="back-link" data-de="← Startseite" data-en="← Home">← Startseite</a>
<button class="lang-btn" id="langBtn">DE</button>

<div class="container">

  <!-- Animated rails -->
  <div class="track-wrap">
    <div class="track">
      <div class="rail"></div>
      <div class="rail"></div>
    </div>
    <div class="sleepers">
      <div class="sleeper"></div>
      <div class="sleeper"></div>
      <div class="sleeper"></div>
      <div class="sleeper"></div>
      <div class="sleeper"></div>
      <div class="sleeper"></div>
      <div class="sleeper"></div>
    </div>
  </div>

  <div class="wip-icon">🚧</div>

  <p class="eyebrow" data-de="In Arbeit" data-en="Work in Progress">In Arbeit</p>
  <h1 data-de="Kommt bald" data-en="Coming soon">Kommt bald</h1>

  <!-- Zeigt den Namen der Seite an, falls per URL-Parameter übergeben -->
  <div class="page-badge" id="pageBadge" style="display:none;"></div>

  <p class="sub">
    <span data-de="Diese Seite ist noch nicht fertig wir arbeiten daran." data-en="This page isn't ready yet we're working on it.">
      Diese Seite ist noch nicht fertig wir arbeiten daran.
    </span><br>
    <strong data-de="Schau bald wieder vorbei." data-en="Check back soon.">Schau bald wieder vorbei.</strong>
  </p>

  <div class="btn-row">
    <a href="curhome.html" class="btn-primary" data-de="← Zur Startseite" data-en="← Back home">← Zur Startseite</a>
    <a href="https://discord.gg/HPUQEUDn6g" target="_blank" class="btn-ghost">Discord</a>
  </div>

</div>

<p class="footer-note">Create: Unlimited Rails</p>

<script>
  let lang = 'de';

  /* Optional: Seitenname per URL-Parameter
     Bsp: wip.html?page=Über+uns
     Dann erscheint ein Badge mit dem Seitennamen */
  const params   = new URLSearchParams(window.location.search);
  const pageName = params.get('page');
  if (pageName) {
    const badge = document.getElementById('pageBadge');
    badge.textContent = pageName;
    badge.style.display = 'inline-block';
  }

  function applyLang() {
    document.getElementById('langBtn').textContent = lang.toUpperCase();
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-de]').forEach(el => {
      el.textContent = el.getAttribute('data-' + lang);
    });
  }

  document.getElementById('langBtn').addEventListener('click', () => {
    lang = lang === 'de' ? 'en' : 'de';
    applyLang();
  });
</script>
</body>
</html>
